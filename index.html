<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Edition — Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:18px}
body{font-family:'Inter',sans-serif;background:#0d0d0d;color:#f5f0eb;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:4rem 2rem}
h1{font-family:'Fraunces',serif;font-size:clamp(2.5rem,6vw,4.5rem);font-weight:900;letter-spacing:-0.03em;margin-bottom:0.3rem}
.subtitle{font-size:1rem;opacity:0.5;margin-bottom:3rem;font-style:italic;font-family:'Fraunces',serif}
.issue-list{list-style:none;width:100%;max-width:700px}
.issue-list li{border-bottom:1px solid rgba(255,255,255,.1)}
.issue-list a{display:flex;justify-content:space-between;align-items:center;padding:1.2rem 0;text-decoration:none;color:#f5f0eb;transition:opacity .2s}
.issue-list a:hover{opacity:.7}
.issue-date{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:700}
.issue-day{font-size:0.9rem;opacity:0.5}
.latest{display:inline-block;font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;padding:3px 10px;border-radius:99px;background:#8b5cf6;color:#fff;margin-left:1rem}
.footer{margin-top:auto;padding-top:3rem;font-size:0.75rem;opacity:0.3;text-align:center}
</style>
</head>
<body>
<h1>Morning Edition</h1>
<p class="subtitle">Daily cybersecurity, AI and privacy digest</p>
<ul class="issue-list" id="issues"></ul>
<div class="footer">Curated from Hacker News. Updated daily at 7am.</div>

<script>
// This script auto-discovers issues by trying dates backwards from today
const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const list = document.getElementById('issues');
const today = new Date();
let found = 0;
let checked = 0;
const maxCheck = 90; // look back 90 days

function checkDate(d) {
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const filename = `magazines/${yyyy}-${mm}-${dd}.html`;
  
  return fetch(filename, {method:'HEAD'}).then(r => {
    if(r.ok) {
      found++;
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = filename;
      const dateSpan = document.createElement('span');
      dateSpan.className = 'issue-date';
      dateSpan.textContent = `${dd} ${months[d.getMonth()]} ${yyyy}`;
      if(found === 1) {
        const badge = document.createElement('span');
        badge.className = 'latest';
        badge.textContent = 'Latest';
        dateSpan.appendChild(badge);
      }
      const daySpan = document.createElement('span');
      daySpan.className = 'issue-day';
      daySpan.textContent = days[d.getDay()];
      a.appendChild(dateSpan);
      a.appendChild(daySpan);
      li.appendChild(a);
      list.appendChild(li);
    }
  }).catch(()=>{});
}

// Check dates sequentially from today backwards
async function discover() {
  for(let i=0; i<maxCheck; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    await checkDate(d);
  }
  if(found === 0) {
    list.innerHTML = '<li style="padding:1.5rem 0;opacity:0.5;text-align:center">No issues found yet. Check back tomorrow at 7am.</li>';
  }
}
discover();
</script>
</body>
</html>
